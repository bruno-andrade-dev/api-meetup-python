services:
  db:
    image: postgres:15
    container_name: meetup_postgres
    restart: always
    environment:
      POSTGRES_USER: user_meetup
      POSTGRES_PASSWORD: password_123
      POSTGRES_DB: db_meetup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: